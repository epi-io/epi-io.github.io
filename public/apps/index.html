<script>
document.addEventListener('DOMContentLoaded', function() {
  const appsGallery = document.getElementById('apps-gallery');
  const appsListSection = document.getElementById('apps-list-section');
  const appViewerSection = document.getElementById('app-viewer-section');
  const appIframe = document.getElementById('app-iframe');
  const appHeaderTitle = document.querySelector('#apps-header .post__title');
  const appBreadcrumb = document.getElementById('app-breadcrumb');
  const currentAppName = document.getElementById('current-app-name');
  const backBtn = document.getElementById('back-to-apps');

  
  document.querySelectorAll('.app-card').forEach(card => {
    card.addEventListener('click', function() {
      const url = this.getAttribute('data-app-url');
      const title = this.getAttribute('data-app-title');
      
      appIframe.src = url;
      currentAppName.textContent = title;
      
      appsListSection.style.display = 'none';
      appHeaderTitle.style.display = 'none';
      
      appViewerSection.style.display = 'block';
      appBreadcrumb.style.display = 'flex';
      
      window.scrollTo(0, 0);
    });
  });

  
  backBtn.addEventListener('click', function() {
    appIframe.src = '';
    
    appViewerSection.style.display = 'none';
    appBreadcrumb.style.display = 'none';
    
    appsListSection.style.display = 'block';
    appHeaderTitle.style.display = 'block';
    
    window.scrollTo(0, 0);
  });
});
</script>
